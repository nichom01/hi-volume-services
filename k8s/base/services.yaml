apiVersion: apps/v1
kind: Deployment
metadata:
  name: declaration-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: declaration-service
  template:
    metadata:
      labels:
        app: declaration-service
    spec:
      containers:
        - name: app
          image: ghcr.io/nichom01/hi-volume-services/declaration-service:latest
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SERVICE_PORT
              value: "8001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            - name: INBOUND_TOPIC
              value: inbound
            - name: DECLARATION_CREATED_TOPIC
              value: declaration.created
            - name: DECLARATION_WORKERS
              value: "16"
            - name: DECLARATION_JOB_BUFFER
              value: "512"
            - name: DECLARATION_WRITER_BATCH_SIZE
              value: "200"
            - name: DECLARATION_WRITER_BATCH_MS
              value: "5"
          ports:
            - containerPort: 8001
          readinessProbe:
            httpGet: { path: /ready, port: 8001 }
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
---
apiVersion: v1
kind: Service
metadata:
  name: declaration-service
spec:
  selector:
    app: declaration-service
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: validate-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: validate-service
  template:
    metadata:
      labels:
        app: validate-service
    spec:
      containers:
        - name: app
          image: ghcr.io/nichom01/hi-volume-services/validate-service:latest
          envFrom: [{ configMapRef: { name: app-config } }]
          env:
            - name: SERVICE_PORT
              value: "8002"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: app-secrets, key: DATABASE_URL } }
            - name: INPUT_TOPIC
              value: declaration.created
            - name: VALIDATION_PASSED_TOPIC
              value: validation.passed
            - name: VALIDATION_FAILED_TOPIC
              value: validation.failed
          ports: [{ containerPort: 8002 }]
          readinessProbe: { httpGet: { path: /ready, port: 8002 } }
          livenessProbe: { httpGet: { path: /health, port: 8002 } }
---
apiVersion: v1
kind: Service
metadata:
  name: validate-service
spec:
  selector: { app: validate-service }
  ports: [{ port: 8002, targetPort: 8002 }]
---
