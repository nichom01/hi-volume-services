name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  go-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - declaration-service
          - validate-service
          - audit-service
          - risk-service
          - calculate-service
          - payment-service
          - notify-service
          - present-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - name: Test service
        working-directory: ${{ matrix.service }}
        run: |
          go mod download
          go test ./...

  docker-build:
    runs-on: ubuntu-latest
    needs: go-test
    strategy:
      fail-fast: false
      matrix:
        service:
          - declaration-service
          - validate-service
          - audit-service
          - risk-service
          - calculate-service
          - payment-service
          - notify-service
          - present-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest

  k8s-validate:
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v4
      - name: Validate kustomize base
        run: kubectl kustomize k8s/base >/dev/null
      - name: Validate kustomize dev overlay
        run: kubectl kustomize k8s/overlays/dev >/dev/null

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [docker-build, k8s-validate]
    if: github.event_name == 'workflow_dispatch'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG_DATA secret not set"
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config"
      - name: Deploy dev overlay
        run: kubectl apply -k k8s/overlays/dev
