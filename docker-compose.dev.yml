services:
  postgres:
    image: postgres:15-alpine
    container_name: hvs-postgres
    environment:
      POSTGRES_DB: microservices
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microservices"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: hvs-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: hvs-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  debezium:
    image: debezium/connect:2.7.3.Final
    container_name: hvs-debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses

  declaration-service:
    build:
      context: ./declaration-service
      dockerfile: Dockerfile
    container_name: hvs-declaration-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVICE_NAME: declaration-service
      ENVIRONMENT: development
      SERVICE_PORT: 8001
      DATABASE_URL: postgres://postgres:devpassword@postgres:5432/microservices?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: declaration-service-group
      INBOUND_TOPIC: inbound
      DECLARATION_CREATED_TOPIC: declaration.created
      LOG_LEVEL: debug
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  validate-service:
    build:
      context: ./validate-service
      dockerfile: Dockerfile
    container_name: hvs-validate-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVICE_NAME: validate-service
      ENVIRONMENT: development
      SERVICE_PORT: 8002
      DATABASE_URL: postgres://postgres:devpassword@postgres:5432/microservices?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: validate-service-group
      INPUT_TOPIC: declaration.created
      VALIDATION_PASSED_TOPIC: validation.passed
      VALIDATION_FAILED_TOPIC: validation.failed
      LOG_LEVEL: debug
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  audit-service:
    build:
      context: ./audit-service
      dockerfile: Dockerfile
    container_name: hvs-audit-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVICE_NAME: audit-service
      ENVIRONMENT: development
      SERVICE_PORT: 8003
      DATABASE_URL: postgres://postgres:devpassword@postgres:5432/microservices?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: audit-service-group
      INPUT_TOPIC: declaration.created
      AUDIT_LOGGED_TOPIC: audit.logged
      LOG_LEVEL: debug
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  risk-service:
    build:
      context: ./risk-service
      dockerfile: Dockerfile
    container_name: hvs-risk-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVICE_NAME: risk-service
      ENVIRONMENT: development
      SERVICE_PORT: 8004
      DATABASE_URL: postgres://postgres:devpassword@postgres:5432/microservices?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_CONSUMER_GROUP: risk-service-group
      INPUT_TOPIC: declaration.created
      RISK_ASSESSED_TOPIC: risk.assessed
      RISK_FLAGGED_TOPIC: risk.flagged
      LOG_LEVEL: debug
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
